<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Size Reducer</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        #upload-slot { border: 2px dashed #007bff; padding: 40px; cursor: pointer; margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #preview { margin-top: 20px; max-width: 100%; height: auto; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Reduce Image Size (MB)</h2>
    <div id="upload-slot">
        <input type="file" id="imageInput" accept="image/*">
        <p>Click to upload or drag an image here</p>
    </div>
    
    <div>
        <label>Target Quality (0.1 to 1.0): </label>
        <input type="number" id="quality" step="0.1" min="0.1" max="1.0" value="0.7">
    </div>
    <br>
    <button onclick="compressImage()">Compress & Download</button>
    <br>
    <img id="preview" alt="Preview">
</div>

<script>
    function compressImage() {
        const fileInput = document.getElementById('imageInput');
        const qualityInput = document.getElementById('quality').value;
        const preview = document.getElementById('preview');

        if (fileInput.files.length === 0) return alert("Please select a file");

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;

            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                // Set dimensions
                canvas.width = img.width;
                canvas.height = img.height;

                // Draw image to canvas
                ctx.drawImage(img, 0, 0);

                // Export to Blob with reduced quality
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    preview.src = url;
                    preview.style.display = "block";

                    // Trigger Auto-Download
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = "compressed-image.jpg";
                    link.click();
                }, 'image/jpeg', parseFloat(qualityInput));
            }
        }
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
